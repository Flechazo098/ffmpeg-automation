name: publish

on:
  push:
    paths:
      - 'src-tauri/tauri.conf.json'
  workflow_dispatch:

jobs:
  publish-tauri:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '')
    
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version and commit message
        id: info
        shell: bash
        run: |
          VERSION=$(jq -r '.package.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          MSG=$(git log -1 --pretty=%s)
          echo "commit_msg=$MSG" >> $GITHUB_OUTPUT

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.info.outputs.version }}
          releaseName: 'FFmpeg Automation Studio v${{ steps.info.outputs.version }}'
          releaseBody: |
            Release Notes:
            ${{ steps.info.outputs.commit_msg }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
